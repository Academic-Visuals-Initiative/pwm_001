<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
<script>
(function(){var t='light';try{t=localStorage.getItem('theme')||'light'}catch(e){}document.documentElement.setAttribute('data-theme',t)})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — Coffee Bean</title>
<link rel="icon" type="image/png" href="../assets/images/logo.png">
<link rel="shortcut icon" type="image/png" href="../assets/images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#fff;--text:#111;--text-muted:#666;--border:#ddd;--surface:#f6f6f6}
[data-theme="dark"]{--bg:#0a0a0a;--text:#f0f0f0;--text-muted:#a3a3a3;--border:#333;--surface:#1c1c1c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:20px;min-height:100dvh;-webkit-font-smoothing:antialiased}
.viewer{width:100%;max-width:900px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column}
.toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
.toolbar a,.toolbar button{font-family:'Inter',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;text-decoration:none;background:var(--bg);border:1px solid var(--border);padding:6px 14px;cursor:pointer;color:var(--text)}
.toolbar a:hover,.toolbar button:hover{background:var(--surface)}
.pages{flex:1;padding:30px;display:flex;flex-direction:column;align-items:center;gap:20px;overflow:auto}
.page-wrap{box-shadow:0 4px 20px rgba(0,0,0,0.08);background:#fff;max-width:100%}
.page-wrap canvas{display:block;max-width:100%;height:auto!important}
[data-theme="dark"] .page-wrap{filter:grayscale(100%) brightness(0.85)}
.loading{padding:60px;text-align:center;color:var(--text-muted);font-size:14px}
</style>
</head>
<body>
<div class="viewer">
    <div class="toolbar">
        <a href="../">Back</a>
        <span id="pageCount" style="font-size:13px;color:var(--text-muted);">0 pages</span>
        <button id="downloadBtn">Download</button>
    </div>
    <div class="pages" id="pages">
        <div class="loading" id="loading">Loading PDF...</div>
    </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var pagesEl=document.getElementById('pages');
var loadingEl=document.getElementById('loading');
var pageCountEl=document.getElementById('pageCount');
var downloadBtn=document.getElementById('downloadBtn');
var pdfUrl='../assets/cv.pdf';
var params=new URLSearchParams(location.search);
if(params.get('url')) pdfUrl=params.get('url');

var scale=1.3;

pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf){
    pageCountEl.textContent=pdf.numPages+' page'+(pdf.numPages>1?'s':'');
    downloadBtn.addEventListener('click',function(){
        var a=document.createElement('a');
        a.href=pdfUrl;
        a.download='cv.pdf';
        a.click();
    });
    var dpr=window.devicePixelRatio||1;
    for(var i=1;i<=pdf.numPages;i++){
        (function(pageNum){
            pdf.getPage(pageNum).then(function(page){
                loadingEl.style.display='none';
                var viewport=page.getViewport({scale:scale});
                var wrap=document.createElement('div');
                wrap.className='page-wrap';
                var cvs=document.createElement('canvas');
                cvs.style.width=viewport.width+'px';
                cvs.style.height=viewport.height+'px';
                cvs.width=Math.floor(viewport.width*dpr);
                cvs.height=Math.floor(viewport.height*dpr);
                wrap.appendChild(cvs);
                pagesEl.appendChild(wrap);
                page.render({canvasContext:cvs.getContext('2d'),viewport:viewport,transform:[dpr,0,0,dpr,0,0]});
            });
        })(i);
    }
}).catch(function(){
    loadingEl.textContent='Could not load PDF.';
});
</script>
</body>
</html>
